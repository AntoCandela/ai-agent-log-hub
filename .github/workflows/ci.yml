name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Check formatting
        run: test -z "$(cd backend && gofmt -l .)" || (echo "Files need formatting:" && cd backend && gofmt -l . && exit 1)

      - name: Run go vet
        run: cd backend && go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run tests with race detection and coverage
        run: cd backend && go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Display coverage summary
        run: cd backend && go tool cover -func=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/coverage.out

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: cd backend && govulncheck ./... || echo "::warning::govulncheck found vulnerabilities — see output above"
        # Advisory only: stdlib vulns require Go toolchain upgrade, not code changes

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-agent-log-hub-backend:ci ./backend

      - name: Verify image starts
        run: |
          docker run -d --name loghub-ci \
            -e DATABASE_URL="postgres://unused:unused@localhost/unused" \
            -p 14800:4800 \
            ai-agent-log-hub-backend:ci || true
          sleep 2
          docker logs loghub-ci 2>&1 | head -20
          docker rm -f loghub-ci

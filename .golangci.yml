version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - nilerr
    - predeclared
  settings:
    errcheck:
      exclude-functions:
        - (*encoding/json.Encoder).Encode
        - (io.Closer).Close
        - (*net/http.Response).Body.Close
        - (net/http.ResponseWriter).Write
    gocritic:
      enabled-tags:
        - diagnostic
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - ifElseChain
        - exitAfterDefer
        - appendAssign
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: loghub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: loghub
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: pg_isready -U loghub
      interval: 5s
      retries: 5

  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    command: --model-id sentence-transformers/all-MiniLM-L6-v2 --port 8090
    ports:
      - '8090:8090'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      embedding:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://loghub:${POSTGRES_PASSWORD}@db:5432/loghub?sslmode=disable
      API_PORT: '4800'
      MIGRATIONS_PATH: /migrations
      EMBEDDING_API_URL: http://embedding:8090
    ports:
      - '4800:4800'

volumes:
  pgdata:
